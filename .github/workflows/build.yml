name: Build EXE

on:
  workflow_run:
    workflows: ["Python CI"]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole --name GerenciadorArquivos --icon=assets/icon.ico main.py

    - name: Upload do EXE
      uses: actions/upload-artifact@v4
      with:
        name: GerenciadorArquivos
        path: dist/GerenciadorArquivos.exe
