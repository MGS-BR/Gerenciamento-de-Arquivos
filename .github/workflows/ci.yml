name: Python CI

on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:

jobs:
  test:
    name: Testando no Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.14']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Atualizar pip
      run: python -m pip install --upgrade pip

    - name: Verificar sintaxe
      run: python -m py_compile main.py

    - name: Format check (Black)
      run: |
        pip install black
        black . --check

    - name: Lint (flake8)
      run: |
        pip install flake8
        flake8 .
        
